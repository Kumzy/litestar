name: "Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (ignored if 'version' is set)"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - stable
          - alpha
          - beta
          - rc
      version:
        description: "Explicit version (overrides bump; e.g. 4.0.0b1 for a major beta)"
        type: string
        required: false
        default: ""
      dry_run:
        description: "Dry run — preview only, write nothing"
        type: boolean
        required: true
        default: true
      base:
        description: "Previous release tag (optional; needed for the first 3.x release)"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: ${{ inputs.dry_run && 'Preview release' || 'Cut release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.8" # >= 0.7 for `uv version`
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ---------------------------------------------------------------- dry run
      - name: Preview release (writes nothing)
        if: ${{ inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.version }}
          BASE: ${{ inputs.base }}
        run: bash tools/release_preview.sh "${EXPLICIT_VERSION:-$BUMP}" "$BASE"

      # ------------------------------------------------------------ real release
      - name: Bump version
        if: ${{ !inputs.dry_run }}
        env:
          BUMP: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$EXPLICIT_VERSION" ]; then
            uv version "$EXPLICIT_VERSION" --no-sync
          else
            uv version --bump "$BUMP" --no-sync
          fi
          VERSION="$(uv version --short)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # final release => fold pre-release sections into one; pre-release => keep its own section
          if printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$'; then
            echo "IS_FINAL=true" >> "$GITHUB_ENV"
          else
            echo "IS_FINAL=false" >> "$GITHUB_ENV"
          fi

      - name: Assemble changelog from fragments
        if: ${{ !inputs.dry_run }}
        run: uvx --from 'towncrier>=24,<26' towncrier build --yes --version "$VERSION"

      - name: Consolidate pre-release sections (final releases only)
        if: ${{ !inputs.dry_run && env.IS_FINAL == 'true' }}
        run: python tools/consolidate_prereleases.py "$VERSION"

      # The GitHub draft release is created by finalize-release.yml once this PR is
      # merged, so its notes reflect the final state of main.
      - name: Open release PR
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git commit -am "chore(release): prepare release v$VERSION"
          git push origin "$BRANCH"
          # --repo pins the PR to the repo running the workflow (a fork would otherwise
          # default to opening the PR against its upstream parent).
          gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$BRANCH" \
            --title "chore(release): v$VERSION" \
            --body "Automated release PR for v$VERSION. Review, merge, then **Publish** the draft release (→ \`publish.yml\` → PyPI)."
