name: "Publish to TestPyPI"

# Fork-only workflow for exercising the release/publish pipeline against TestPyPI
# (https://test.pypi.org). Kept SEPARATE from publish.yml so the real-PyPI publish
# can never be accidentally retargeted. On upstream it has no token and no-ops.
#
# Auth: TestPyPI API token stored as the REPOSITORY secret TEST_PYPI_API_TOKEN.
# (To switch to OIDC trusted publishing instead: add `permissions: id-token: write`
#  and an `environment:` that matches the TestPyPI pending publisher, then drop the
#  `password:` line below.)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-testpypi:
    name: Upload release to TestPyPI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.8.8"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true
